<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일본어 생활회화 - TV Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>일본어 생활회화</h1>
    <div class="header-right">
        <div id="nav">
            <button id="homeBtn" title="메인 화면"> 🏠 </button>
            <button onclick="showPage('menu')" class="active-nav">홈</button>
            <button onclick="showPage('conversation')">회화</button>
            <button onclick="showPage('quiz')">퀴즈</button>
        </div>
    </div>
</header>

<main class="container">
    <div id="menuPage" class="page active">
        <div class="welcome-section">
            <h2>안녕하세요! 자연스러운 생활회화를 연습해보세요.</h2>
            <p>원하는 학습 모드를 선택해 주세요.</p>
        </div>
        <div class="dashboard-grid">
            <div class="dash-card word-card" onclick="showPage('conversation')">
                <div class="dash-card-icon">🗣️</div>
                <h3>회화 연습</h3>
                <p>유용한 생활회화 문장과 발음을 학습합니다.</p>
                <span class="dash-card-btn">시작하기 →</span>
            </div>
            <div class="dash-card quiz-card" onclick="showPage('quiz')">
                <div class="dash-card-icon">🎯</div>
                <h3>퀴즈 도전</h3>
                <p>한국어 뜻을 보고 일본어 문장을 맞히는 테스트에 도전합니다.</p>
                <span class="dash-card-btn">도전하기 →</span>
            </div>
        </div>
    </div>

    <div id="conversationPage" class="page">
        <div id="card" class="word-mode"></div>

        <div class="navigation">
            <button onclick="prevConversation()">← 이전 문장</button>
            <button onclick="nextConversation()">다음 문장 →</button>
        </div>
    </div>

    <div id="quizPage" class="page">
        <div class="quiz-container">
            <div id="question"></div>

            <button class="quiz-action-btn" onclick="showAnswer()">정답 보기</button>

            <div id="answer"></div>

            <button class="quiz-nav-btn" onclick="nextQuiz()">다음 문제 →</button>
        </div>
    </div>
</main>

<script src="script.js"></script>

</body>
</html>
