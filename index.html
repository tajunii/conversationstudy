<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일본어 생활회화 퀴즈</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="app-header">
    <div class="header-left">
        <button class="homebtn" id="homeBtn" title="홈으로">🏠</button>
    </div>
    
    <h1>일본어 회화 퀴즈</h1>
    
    <div class="header-right">
        <select id="categoryFilter" class="custom-select" onchange="changeFilter()">
            <option value="전체">카테고리 전체</option>
        </select>
        <select id="cycleFilter" class="custom-select" onchange="changeFilter()">
            <option value="전체">학습주기 전체</option>
        </select>
    </div>
</header>

<main class="container">
    <div id="quizPage" class="page active">
        <div class="quiz-controls-panel">
            <span id="progressText" class="progress-text" title="현재 조건에서 점수가 0점(완벽)인 문제의 비율입니다.">마스터율 계산 중...</span>
            <div class="action-buttons">
                <button onclick="resetScores()" class="control-btn" style="color: #f87171; border-color: rgba(248, 113, 113, 0.4);">기록 초기화</button>
            </div>
        </div>

        <div class="quiz-container">
            <div id="question">데이터를 불러오는 중입니다...</div>

            <button id="showAnswerBtn" class="quiz-action-btn" onclick="showAnswer()">정답 보기 (Space)</button>

            <div id="answer"> 
                <div id="jpText" class="tts-clickable" onclick="playAudio()">일본어 정답</div>
                <div id="metaText" class="meta-info">문법 설명 및 팁</div>
            </div>

            <div id="evaluationButtons" style="display: none;">
    <button class="eval-btn perfect" onclick="evaluateAnswer('perfect')">
        😊 바로 맞춤
    </button>
    <button class="eval-btn retry" onclick="evaluateAnswer('retry')">
        ❌ 다시 한 번
    </button>
</div>
        </div>
    </div>
</main>

<script src="script.js"></script>
</body>
</html>
