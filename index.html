<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일본어 생활회화 퀴즈</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="app-header">
    <div class="header-left">
        <button class="homebtn" id="homeBtn" title="홈으로">
            🏠
        </button>
    </div>
    
    <h1>일본어 회화 퀴즈</h1>
    
    <div class="header-right">
        <select id="weekFilter" class="custom-select" onchange="changeWeekFilter()">
            <option value="전체">전체 주차</option>
        </select>
    </div>
</header>

<main class="container">
    <div id="quizPage" class="page active">
        <div class="quiz-container">
            <!-- 한글 문제 표시 영역 -->
            <div id="question">데이터를 불러오는 중입니다...</div>

            <!-- 정답 보기 버튼 -->
            <button id="showAnswerBtn" class="quiz-action-btn" onclick="showAnswer()">정답 보기</button>

            <!-- 정답 표시 영역 -->
            <!-- 정답 표시 영역 중 jpText 부분 수정 -->
            <div id="answer"> 
            <!-- 변경된 부분: onclick="playAudio()" -->
                <div id="jpText" class="tts-clickable" onclick="playAudio()">일본어 정답</div>
                <div id="metaText" class="meta-info">문법 설명 및 팁</div>
            </div>

            <!-- 다음 문제 버튼 -->
            <button id="nextQuestionBtn" class="start-btn style-next-btn" style="display:none;" onclick="nextQuiz()">다음 문제 →</button>
        </div>
    </div>
</main>

<script src="script.js"></script>
</body>
</html>
